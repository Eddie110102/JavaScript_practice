<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>溫度轉換</title>
  </head>
  <body>
    <h1>
      請設計一個
      function，傳入攝氏溫度可以轉成華氏溫度，傳入華氏溫度可以轉成攝氏溫度
    </h1>
    <hr />
    <label>
      <select name="unit" id="unit">
        <option value="c">攝氏（℃ ）</option>
        <option value="f">華氏（℉ ）</option>
      </select>
    </label>
    <input type="text" id="temperature" />
    <div id="result"></div>
    <script>
      const unit = document.getElementById("unit");
      const temperature = document.getElementById("temperature");
      const result = document.getElementById("result");

      temperature.addEventListener("input", () => {

        reFresh(temperature.value, unit.value)
      });
      unit.addEventListener("change", () => {
        reFresh(temperature.value, unit.value)

      });

      function translate(a, b) {
        let res = "請輸入數字"; 
        switch (b) {
          case "c":
            res = `華氏溫度為 ${((a * 9) / 5 + 32).toFixed(2)} ℉`;
            break;
          case "f":
            res = `攝氏溫度為 ${(((a - 32) * 5) / 9).toFixed(2)} ℃ `;
            break;
          default:
            res = "請輸入數字";
            break;
        }
        return res;
      }

      function reFresh(a, b) {
        let res = translate(a, b);
        result.innerHTML = res;
      }
    </script>
  </body>
</html>
